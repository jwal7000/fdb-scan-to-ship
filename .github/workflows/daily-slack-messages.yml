name: Daily Store Slack Messages

on:
  schedule:
    - cron: '30 11 * * *'
  workflow_dispatch:

jobs:
  send-messages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Start Cloud SQL Proxy
        run: |
          curl -fsSL -o cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.1/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          echo '${{ secrets.GCP_SERVICE_KEY_B64 }}' | base64 -d > gcp-key.json
          echo "Key file size: $(wc -c < gcp-key.json) bytes"
          ./cloud-sql-proxy --credentials-file=gcp-key.json --port=3306 analytics-link-370416:us-central1:fivedaughtersbakery > /tmp/proxy.log 2>&1 &
          sleep 10
          cat /tmp/proxy.log
          nc -zv 127.0.0.1 3306 && echo "PORT OPEN" || echo "PORT CLOSED"
      - name: Send daily store messages
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DB: ${{ secrets.MYSQL_DB }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: node daily-store-messages.js
