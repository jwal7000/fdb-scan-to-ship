name: Daily Store Slack Messages

on:
  workflow_dispatch:

jobs:
  send-messages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Start Cloud SQL Proxy
        run: |
          curl -o cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.6.0/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          echo '${{ secrets.GCP_SERVICE_KEY_B64 }}' | base64 -d > gcp-key.json
          ./cloud-sql-proxy --credentials-file=gcp-key.json --port=3306 analytics-link-370416:us-central1:fivedaughtersbakery &
          sleep 5
      - name: Send messages
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DB: production
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: node daily-store-messages.js
